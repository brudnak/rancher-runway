rancher:
  mode: manual
  helm_commands:
    - |
      helm install rancher rancher-prime/rancher \
        --namespace cattle-system \
        --version 2.13.4 \
        --set hostname=placeholder \
        --set bootstrapPassword=change-me \
        --set tls=external \
        --set global.cattle.psp.enabled=false \
        --set rancherImage=registry.rancher.com/rancher/rancher \
        --set rancherImageTag=v2.13.4 \
        --set agentTLSMode=system-store
    - |
      helm install rancher rancher-latest/rancher \
        --namespace cattle-system \
        --version 2.14.0 \
        --set hostname=placeholder \
        --set bootstrapPassword=change-me \
        --set tls=external \
        --set global.cattle.psp.enabled=false \
        --set rancherImageTag=v2.14.0 \
        --set agentTLSMode=system-store

total_has: 2

user:
  first_name: ""
  last_name: ""

k8s:
  versions:
    - "v1.33.7+rke2r1"
    - "v1.34.6+rke2r1"

rke2:
  # RKE2 server nodes per Rancher cluster: 1 single-server, 3 default HA, or 5 expanded HA.
  server_count: 3
  install_script_sha256s:
    v1.33.7+rke2r1: "bfbd978d603b7070f5748c934326db509bf1470c97d3f61a3aaa6e2eed6bd054"
    v1.34.6+rke2r1: "2d24db2184dd6b1a5e281fa45cc9a8234c889394721746f89b5fe953fdaaf40a"
  preload_images: true

gpu_worker:
  enabled: false
  # standard = g5.xlarge, 24 GB GPU memory; large = p5.4xlarge, 80 GB GPU memory.
  profile: standard
  instance_type: g5.xlarge
  # Leave blank to auto-select the latest AWS Deep Learning Base OSS Nvidia Driver GPU AMI (Ubuntu 22.04).
  ami: ""
  subnet_id: ""

tf_vars:
  aws_region: "us-east-2"
  aws_prefix: "xyz" # 2 or 3 letters, usually your initials
  aws_vpc: ""
  aws_subnet_a: ""
  aws_subnet_b: ""
  aws_subnet_c: ""
  aws_ami: ""
  aws_subnet_id: ""
  aws_security_group_id: ""
  aws_pem_key_name: ""
  aws_route53_fqdn: ""
  # Optional: custom Rancher DNS label, for example "brudnak" -> brudnak.<aws_route53_fqdn>.
  # Requires total_has: 1. Omit or leave blank for generated names.
  custom_hostname_prefix: ""
