rancher:
  mode: auto
  versions:
    - "2.13-head" # host Rancher
    - "2.13.4"    # tenant 1 Rancher
    - "2.12.4"    # tenant 2 Rancher
  distro: auto
  bootstrap_password: "change-me"
  auto_approve: false

deployment:
  type: hosted-tenant-k3s

k3s:
  preload_images: true

# Total host + tenant Rancher instances. Instance 1 is the host; instances 2+ are tenants. Supported range: 2-4.
total_rancher_instances: 3

user:
  first_name: ""
  last_name: ""

tf_vars:
  aws_region: "us-east-2"
  aws_prefix: "xyz" # 2 or 3 letters, usually your initials
  aws_vpc: ""
  aws_subnet_a: ""
  aws_subnet_b: ""
  aws_subnet_c: ""
  aws_ami: ""
  aws_subnet_id: ""
  aws_security_group_id: ""
  aws_pem_key_name: ""
  aws_route53_fqdn: ""
  aws_rds_password: "" # 8-41 printable ASCII chars; no /, ', ", @, or spaces. The setup UI can generate one.
  aws_ec2_instance_type: "m5.large"
